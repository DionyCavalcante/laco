<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laco - Superadmin</title>
  <style>
    :root{--bg:#f5f6f4;--ink:#17231f;--muted:#66736d;--line:#d8ded9;--brand:#1e6f5c;--danger:#a33a2f;--warn:#9b6a1a}
    *{box-sizing:border-box}body{font-family:Inter,system-ui,sans-serif;margin:0;background:var(--bg);color:var(--ink)}main{max-width:1280px;margin:auto;padding:24px 16px 48px}
    header{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
    .card,section{background:white;border:1px solid var(--line);border-radius:8px;padding:16px}.card strong{display:block;font-size:24px}.muted{color:var(--muted);font-size:13px}
    .tabs{display:flex;gap:8px;margin:18px 0}.tabs button{background:white;color:var(--ink);border:1px solid var(--line)}.tabs button.active{background:var(--brand);color:white;border-color:var(--brand)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0 16px}.split{display:grid;grid-template-columns:minmax(280px,390px) 1fr;gap:14px}.list{display:grid;gap:8px}
    .account{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff;cursor:pointer}.account.active{border-color:var(--brand);box-shadow:0 0 0 2px #1e6f5c22}.account h3{margin:0 0 4px;font-size:16px}
    table{width:100%;border-collapse:collapse;margin-top:12px}td,th{padding:10px;border-bottom:1px solid #e5e8e5;text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    input,select,button{padding:10px;border-radius:6px;border:1px solid #bdc8c1;font:inherit}input,select{background:white}button{background:var(--brand);color:white;border:0;font-weight:800;cursor:pointer}button.secondary{background:#eef3f0;color:var(--ink)}button.warn{background:var(--warn)}button.danger{background:var(--danger)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;background:#eef3f0;font-size:12px}.pill.suspended{background:#f8e5e1;color:#7a231b}.pill.active{background:#e4f2e9;color:#1e6f5c}.pill.trial{background:#fff3d8;color:#8a5b12}
    .detail{min-height:420px}.hidden{display:none}.user-row{display:grid;grid-template-columns:1.2fr 1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:8px}
    @media(max-width:850px){header,.split{display:block}.tabs{overflow:auto}.user-row{grid-template-columns:1fr}.toolbar input{width:100%}}
  </style>
</head>
<body>
  <main>
    <header>
      <div><h1>Superadmin</h1><p class="muted">Central para operar clinicas, contas, acessos e suporte.</p></div>
      <button class="secondary" onclick="logout()">Sair</button>
    </header>
    <div class="grid" id="metrics"></div>
    <nav class="tabs">
      <button id="tab-accounts" class="active" onclick="setTab('accounts')">Contas</button>
      <button id="tab-clinics" onclick="setTab('clinics')">Clinicas</button>
      <button id="tab-users" onclick="setTab('users')">Usuarios</button>
    </nav>

    <section id="view-accounts">
      <div class="toolbar">
        <input id="search" placeholder="Buscar por clinica, slug ou email" oninput="filterAccounts()">
        <button class="secondary" onclick="load()">Atualizar</button>
      </div>
      <div class="split">
        <div class="list" id="accounts"></div>
        <div class="detail" id="accountDetail"></div>
      </div>
    </section>

    <section id="view-clinics" class="hidden">
      <h2>Criar clinica</h2>
      <div class="toolbar">
        <input id="name" placeholder="Nome da clinica">
        <input id="email" placeholder="Email admin">
        <input id="pass" placeholder="Senha admin">
        <button onclick="createClinic()">Criar</button>
      </div>
      <table><thead><tr><th>Nome</th><th>Slug</th><th>Status</th><th>Trial</th><th>Onboarding</th><th>Acoes</th></tr></thead><tbody id="rows"></tbody></table>
    </section>

    <section id="view-users" class="hidden">
      <h2>Usuarios</h2>
      <table><thead><tr><th>Clinica</th><th>Email</th><th>Role</th><th>Status</th><th>Ultimo login</th><th>Acoes</th></tr></thead><tbody id="usersRows"></tbody></table>
    </section>
  </main>
  <script>
    const originalToken = localStorage.getItem('superadminToken') || localStorage.getItem('token')
    const token = originalToken
    const headers = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }
    let clinics = [], accountsData = [], usersData = [], selectedClinicId = null

    async function api(path, opts = {}) {
      const r = await fetch('/api/superadmin' + path, { ...opts, headers: { ...headers, ...opts.headers } })
      if (r.status === 401 || r.status === 403) { location.href = '/login'; return {} }
      const data = await r.json().catch(() => ({}))
      if (!r.ok) throw new Error(data.error || 'Erro na requisicao')
      return data
    }
    function setTab(tab) {
      for (const name of ['accounts','clinics','users']) {
        document.getElementById('view-' + name).classList.toggle('hidden', name !== tab)
        document.getElementById('tab-' + name).classList.toggle('active', name === tab)
      }
    }
    function statusPill(status){ return `<span class="pill ${status || ''}">${status || '-'}</span>` }
    function fmtDate(value){ return value ? new Date(value).toLocaleDateString('pt-BR') : '-' }
    function escapeHtml(value){ return String(value ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])) }

    async function load() {
      const m = await api('/dashboard')
      metrics.innerHTML = Object.entries(m).map(([k,v]) => `<div class="card"><strong>${v}</strong><span class="muted">${k}</span></div>`).join('')
      clinics = await api('/clinics')
      accountsData = await api('/accounts')
      usersData = await api('/users')
      renderClinics()
      renderUsers()
      renderAccounts(accountsData)
    }
    function renderClinics() {
      rows.innerHTML = clinics.map(c => `<tr><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.slug)}</td><td>${statusPill(c.status)}</td><td>${c.trial_days_left ?? '-'}</td><td>${c.onboarding_step || 0}/4</td><td><div class="actions">${accountButtons(c.id, c.slug)}<button class="warn" onclick="statusClinic('${c.id}','suspended')">Suspender</button><button onclick="statusClinic('${c.id}','active')">Ativar</button></div></td></tr>`).join('')
    }
    function renderUsers() {
      usersRows.innerHTML = usersData.map(u => `<tr><td>${escapeHtml(u.clinic_name || '-')}</td><td>${escapeHtml(u.email)}</td><td>${u.role}</td><td>${u.active ? 'Ativo' : 'Inativo'}</td><td>${fmtDate(u.last_login)}</td><td><div class="actions"><button class="secondary" onclick="editEmail('${u.id}','${escapeHtml(u.email)}')">Mudar email</button><button class="secondary" onclick="resetPassword('${u.id}')">Refazer senha</button><button class="${u.active ? 'danger' : ''}" onclick="setUserActive('${u.id}',${!u.active})">${u.active ? 'Desativar' : 'Ativar'}</button></div></td></tr>`).join('')
    }
    function renderAccounts(list) {
      accounts.innerHTML = list.map(a => `<article class="account ${a.clinic_id === selectedClinicId ? 'active' : ''}" onclick="selectAccount('${a.clinic_id}')"><h3>${escapeHtml(a.clinic_name)}</h3><div class="muted">${escapeHtml(a.slug)} · ${a.users.length} usuario(s)</div><div>${statusPill(a.status)} <span class="pill">${a.onboarding_step || 0}/4</span></div></article>`).join('')
      if (!selectedClinicId && list[0]) selectedClinicId = list[0].clinic_id
      renderAccountDetail()
    }
    function renderAccountDetail() {
      const a = accountsData.find(item => item.clinic_id === selectedClinicId)
      if (!a) { accountDetail.innerHTML = '<p class="muted">Selecione uma conta.</p>'; return }
      const users = a.users.map(u => `<div class="user-row"><div><strong>${escapeHtml(u.email)}</strong><div class="muted">${u.role} · ${u.active ? 'ativo' : 'inativo'} · ultimo login ${fmtDate(u.last_login)}</div></div><input id="email-${u.id}" value="${escapeHtml(u.email)}"><div class="actions"><button class="secondary" onclick="saveEmail('${u.id}')">Salvar email</button><button class="secondary" onclick="resetPassword('${u.id}')">Senha</button><button class="${u.active ? 'danger' : ''}" onclick="setUserActive('${u.id}',${!u.active})">${u.active ? 'Desativar' : 'Ativar'}</button></div></div>`).join('')
      accountDetail.innerHTML = `<h2>${escapeHtml(a.clinic_name)}</h2><p>${statusPill(a.status)} <span class="pill">${escapeHtml(a.plan || 'standard')}</span> <span class="pill">Leads ${a.leads_count}</span> <span class="pill">Agendamentos ${a.appointments_count}</span></p><p class="muted">Slug: ${escapeHtml(a.slug)} · Criada em ${fmtDate(a.clinic_created_at)} · Onboarding ${a.onboarding_step || 0}/4</p><div class="actions">${accountButtons(a.clinic_id, a.slug)}</div><h3>Usuarios da conta</h3>${users || '<p class="muted">Nenhum usuario admin.</p>'}<h3>Novo admin</h3><div class="toolbar"><input id="newEmail" placeholder="Email"><input id="newPass" placeholder="Senha"><button onclick="createUser('${a.clinic_id}')">Criar admin</button></div>`
      renderAccountsListState()
    }
    function renderAccountsListState(){ document.querySelectorAll('.account').forEach(el => el.classList.remove('active')); const idx = accountsData.findIndex(a => a.clinic_id === selectedClinicId); if (idx >= 0) accounts.children[idx]?.classList.add('active') }
    function accountButtons(id, slug) {
      return `<button onclick="event.stopPropagation(); impersonate('${id}','/painel',true)">Entrar CRM</button><button class="secondary" onclick="event.stopPropagation(); impersonate('${id}','/onboarding',false)">Configurar</button><button class="secondary" onclick="event.stopPropagation(); window.open('/${slug}/agendar','_blank')">Portal</button>`
    }
    function selectAccount(id){ selectedClinicId = id; renderAccountDetail() }
    function filterAccounts(){ const q = search.value.toLowerCase(); renderAccounts(accountsData.filter(a => `${a.clinic_name} ${a.slug} ${a.users.map(u => u.email).join(' ')}`.toLowerCase().includes(q))) }
    async function createClinic(){ await api('/clinics',{method:'POST',body:JSON.stringify({name:name.value,admin_email:email.value,admin_password:pass.value})}); name.value=email.value=pass.value=''; await load() }
    async function statusClinic(id,status){ await api('/clinics/'+id+'/status',{method:'PATCH',body:JSON.stringify({status})}); await load() }
    async function impersonate(id, target, newTab = false){ localStorage.setItem('superadminToken', originalToken); const r = await api('/impersonate/'+id,{method:'POST'}); localStorage.setItem('token',r.token); if (r.slug) localStorage.setItem('laco_slug', r.slug); sessionStorage.setItem('impersonationBanner',r.banner); const dest = target === '/painel' && r.slug ? '/'+r.slug+'/' : (target || (r.slug ? '/'+r.slug+'/' : '/painel')); if (newTab) window.open(dest,'_blank'); else location.href = dest }
    async function editEmail(id,current){ const next = prompt('Novo email', current); if(next) { await api('/users/'+id+'/email',{method:'PATCH',body:JSON.stringify({email:next})}); await load() } }
    async function saveEmail(id){ const value = document.getElementById('email-'+id).value; await api('/users/'+id+'/email',{method:'PATCH',body:JSON.stringify({email:value})}); await load() }
    async function resetPassword(id){ const password = prompt('Nova senha'); if(password) { await api('/users/'+id+'/password',{method:'PATCH',body:JSON.stringify({password})}); alert('Senha atualizada') } }
    async function setUserActive(id,active){ await api('/users/'+id+'/active',{method:'PATCH',body:JSON.stringify({active})}); await load() }
    async function createUser(clinicId){ await api('/users',{method:'POST',body:JSON.stringify({clinic_id:clinicId,email:newEmail.value,password:newPass.value})}); await load() }
    function logout(){ localStorage.removeItem('token'); localStorage.removeItem('superadminToken'); location.href='/login' }
    load().catch(err => alert(err.message))
  </script>
</body>
</html>
