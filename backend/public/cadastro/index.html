<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astrai - Cadastro</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;margin:0;background:#f7f6f1;color:#1d2522}
    main{max-width:520px;margin:0 auto;padding:32px 18px}.panel{background:#fff;border:1px solid #ddd8ce;border-radius:8px;padding:24px}
    label{display:block;margin:14px 0 6px;font-weight:650}input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #c9c2b6;border-radius:6px;font:inherit}
    button{width:100%;margin-top:18px;padding:13px;border:0;border-radius:6px;background:#1e6f5c;color:white;font-weight:800}.hint{font-size:13px;color:#5d665f}.error{color:#9b1c1c}
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Cadastro</h1>
      <form id="form">
        <label>Nome da clinica</label><input id="clinic" required>
        <p class="hint">Slug: <strong id="slug">-</strong></p>
        <label>Email</label><input id="email" type="email" required>
        <label>Senha</label><input id="password" type="password" minlength="8" required>
        <p class="hint" id="strength">Minimo 8 caracteres</p>
        <label>Confirmar senha</label><input id="confirm" type="password" minlength="8" required>
        <p class="error" id="error"></p>
        <button>Criar conta</button>
      </form>
      <p><a href="/login">Ja tenho conta - Entrar</a></p>
    </section>
  </main>
  <script>
    let timer
    clinic.addEventListener('input', () => {
      clearTimeout(timer)
      timer = setTimeout(async () => {
        if (!clinic.value.trim()) return
        const res = await fetch('/api/auth/slug/check?name=' + encodeURIComponent(clinic.value))
        const data = await res.json()
        slug.textContent = data.slug
      }, 500)
    })
    password.addEventListener('input', () => {
      const score = [password.value.length >= 8, /[A-Z]/.test(password.value), /\d/.test(password.value), /[^A-Za-z0-9]/.test(password.value)].filter(Boolean).length
      strength.textContent = ['Fraca','Basica','Boa','Forte'][Math.max(0, score - 1)] || 'Minimo 8 caracteres'
    })
    form.addEventListener('submit', async (event) => {
      event.preventDefault()
      error.textContent = ''
      const res = await fetch('/api/auth/register', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ clinic_name: clinic.value, email: email.value, password: password.value, password_confirm: confirm.value })
      })
      const data = await res.json()
      if (!res.ok) { error.textContent = data.error || 'Falha no cadastro'; return }
      localStorage.setItem('token', data.token)
      localStorage.setItem('refreshToken', data.refreshToken)
      location.href = '/checkout'
    })
  </script>
</body>
</html>
