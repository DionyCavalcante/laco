<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrai — Relatório</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>

/* ─── Reset ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html, body { height: 100%; overflow: hidden }
body {
  font-family: 'Satoshi', -apple-system, sans-serif;
  color: #1C1917;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  background: #EAE6E0;
}
a { color: inherit; text-decoration: none }
button { font-family: inherit; cursor: pointer }
input { font-family: inherit }

/* ─── Tokens ─────────────────────────────────── */
:root {
  --sb-bg:         #0B1F2A;
  --sb-text:       rgba(245,245,242,0.52);
  --sb-text-hover: rgba(245,245,242,0.88);
  --sb-gold:       #C9A96E;
  --sb-active-bg:  rgba(201,169,110,0.15);
  --sb-border:     rgba(255,255,255,0.08);
  --sb-width:      220px;

  --brand:     #8B6914;
  --brand-h:   #7a5c11;
  --brand-dim: rgba(139,105,20,0.10);
  --brand-ring:rgba(139,105,20,0.20);
  --brand-l:   #C9A96E;

  --bg:       #EAE6E0;
  --surface:  #FAFAF7;
  --surface2: #F0EDE8;
  --border:   #DDD9D2;
  --border-m: #ccc8c0;
  --shadow:   0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.10);

  --green:    #1f8f5e;
  --green-bg: rgba(31,143,94,0.10);
  --amber:    #b07810;
  --amber-bg: rgba(176,120,16,0.10);
  --red:      #c03535;
  --red-bg:   rgba(192,53,53,0.10);
  --blue:     #3e6fc0;
  --blue-bg:  rgba(62,111,192,0.10);

  --t0: #1C1917;
  --t1: #7a7268;
  --t2: #a09890;
  --t3: #ccc8c0;
}

/* ─── Layout ─────────────────────────────────── */
.admin-layout { display: flex; height: 100vh; overflow: hidden }

/* ─── Sidebar (idêntico) ─────────────────────── */
.sidebar {
  width: var(--sb-width);
  flex-shrink: 0;
  background: var(--sb-bg);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
  overflow: hidden;
  z-index: 50;
}
.sb-watermark { position: absolute; bottom: 52px; right: -20px; width: 124px; height: 124px; color: white; opacity: 0.038; pointer-events: none }
.sb-watermark svg { width: 100%; height: 100% }
.sb-brand { padding: 18px 16px 16px; border-bottom: 1px solid var(--sb-border); flex-shrink: 0; display: flex; align-items: center; gap: 11px }
.sb-compass { width: 32px; height: 32px; flex-shrink: 0 }
.sb-name { font-family: 'Satoshi', sans-serif; font-weight: 700; font-size: 16px; color: rgba(245,245,242,0.95); letter-spacing: 0.22em; line-height: 1.15 }
.sb-tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; color: rgba(245,245,242,0.40); letter-spacing: 0.02em; margin-top: 2px }
.sb-nav { flex: 1; padding: 10px 0; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none }
.sb-nav::-webkit-scrollbar { display: none }
.sb-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; font-size: 13px; font-weight: 400; color: var(--sb-text); text-decoration: none; transition: color 0.15s, background 0.15s, box-shadow 0.15s; white-space: nowrap }
.sb-item svg { width: 15px; height: 15px; flex-shrink: 0; stroke-width: 1.6 }
.sb-item:hover { color: var(--sb-text-hover); background: rgba(255,255,255,0.05) }
.sb-item.active { color: var(--sb-gold); background: var(--sb-active-bg); box-shadow: inset 3px 0 0 var(--sb-gold); font-weight: 500 }
.sb-divider { height: 1px; background: var(--sb-border); margin: 6px 18px }
.sb-bottom { padding: 14px; border-top: 1px solid var(--sb-border); flex-shrink: 0 }
.sb-user { display: flex; align-items: center; gap: 9px }
.sb-user-av { width: 30px; height: 30px; border-radius: 50%; background: rgba(201,169,110,0.16); border: 1px solid rgba(201,169,110,0.26); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--sb-gold); flex-shrink: 0; font-family: 'Cormorant Garamond', Georgia, serif }
.sb-user-info { flex: 1; min-width: 0 }
.sb-user-name { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.sb-user-role { font-size: 9px; color: var(--sb-text); text-transform: uppercase; letter-spacing: 0.10em; margin-top: 1px }
.sb-logout { width: 28px; height: 28px; background: none; border: none; color: rgba(255,255,255,0.30); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: all 0.15s; flex-shrink: 0; padding: 0 }
.sb-logout svg { width: 14px; height: 14px }
.sb-logout:hover { color: rgba(255,255,255,0.70); background: rgba(255,255,255,0.07) }

/* ─── Main ───────────────────────────────────── */
.main {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
  min-width: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--t3) transparent;
}

/* ─── Period bar (sticky) ────────────────────── */
.period-cmd-bar { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30 }
.period-cmd-inner { padding: 0 28px; height: 46px; display: flex; align-items: center }
.pcb-status { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-right: 18px; margin-right: 14px; border-right: 1px solid var(--border-m) }
.pcb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--t3); transition: background 0.25s, box-shadow 0.25s; flex-shrink: 0 }
.pcb-dot.live { background: var(--brand); box-shadow: 0 0 0 2.5px var(--brand-ring) }
.pcb-info { display: flex; flex-direction: column; gap: 1px; line-height: 1 }
.pcb-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.10em; color: var(--t2) }
.pcb-range { font-size: 12px; font-weight: 600; color: var(--brand); white-space: nowrap }
.pcb-pills { display: flex; gap: 1px; flex: 1; align-items: center; overflow-x: auto; scrollbar-width: none }
.pcb-pills::-webkit-scrollbar { display: none }
.pcb-pill { padding: 4px 12px; font-size: 11.5px; font-weight: 500; border: 1px solid transparent; border-radius: 20px; cursor: pointer; color: var(--t1); background: none; white-space: nowrap; transition: all 0.12s; font-family: 'Satoshi', sans-serif; flex-shrink: 0 }
.pcb-pill:hover:not(.on) { background: var(--surface2); color: var(--t0) }
.pcb-pill.on { background: var(--brand-dim); border-color: rgba(181,146,72,0.24); color: var(--brand); font-weight: 600 }
.pcb-sep { width: 1px; height: 18px; background: var(--border-m); flex-shrink: 0; margin: 0 12px }
.pcb-custom-wrap { position: relative; flex-shrink: 0 }
.pcb-custom { display: flex; align-items: center; gap: 5px; padding: 4px 12px; font-size: 11.5px; font-weight: 500; border: 1px dashed var(--border-m); border-radius: 20px; cursor: pointer; color: var(--t2); background: none; font-family: 'Satoshi', sans-serif; transition: all 0.12s }
.pcb-custom svg { width: 11px; height: 11px }
.pcb-custom:hover { background: var(--surface2); color: var(--t1); border-color: var(--brand-l); border-style: solid }
.pcb-custom.on { background: var(--brand-dim); border-color: rgba(181,146,72,0.26); color: var(--brand); border-style: solid }
.date-picker-panel { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; z-index: 50; min-width: 258px; box-shadow: 0 8px 32px rgba(0,0,0,0.12) }
.date-picker-panel.on { display: block }
.dp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px }
.dp-label { font-size: 11px; color: var(--t1); width: 22px; flex-shrink: 0; font-weight: 500 }
.dp-input { flex: 1; padding: 7px 10px; font-size: 12px; border: 1px solid var(--border-m); border-radius: 7px; background: var(--bg); color: var(--t0); outline: none; font-family: 'Satoshi', sans-serif }
.dp-input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-ring) }
.dp-actions { display: flex; gap: 6px; margin-top: 10px }
.dp-apply { flex: 1; padding: 8px; background: var(--brand); border: none; border-radius: 8px; color: white; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Satoshi', sans-serif }
.dp-clear { padding: 8px 12px; background: none; border: 1px solid var(--border-m); border-radius: 8px; color: var(--t1); font-size: 12px; cursor: pointer; font-family: 'Satoshi', sans-serif }

/* ─── Page ───────────────────────────────────── */
.page { max-width: 960px; margin: 0 auto; padding: 32px 28px 60px }

.page-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 30px;
  font-weight: 600;
  color: var(--t0);
  letter-spacing: -0.2px;
  line-height: 1.05;
  margin-bottom: 5px;
}
.page-sub { font-size: 12px; color: var(--t2); margin-bottom: 28px }

/* ─── KPI grid (gerado por JS) ───────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 16px 18px;
}
.kpi-label { font-size: 10px; color: var(--t2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 7px }
.kpi-val {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.8px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: var(--t0);
}
.kpi-sub { font-size: 11px; color: var(--t2); margin-top: 5px }
.kpi-val.green  { color: var(--green)  }
.kpi-val.purple { color: var(--brand)  }
.kpi-val.amber  { color: var(--amber)  }
.kpi-val.red    { color: var(--red)    }

/* ─── Charts row ─────────────────────────────── */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.chart-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 18px 20px;
}
.chart-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--t2);
  margin-bottom: 16px;
}

/* ─── Funnel ─────────────────────────────────── */
.funnel { display: flex; flex-direction: column; gap: 8px }
.funnel-row { display: flex; align-items: center; gap: 10px }
.funnel-label { font-size: 12px; color: var(--t1); width: 120px; flex-shrink: 0; text-align: right }
.funnel-bar-wrap { flex: 1; height: 28px; background: var(--surface2); border-radius: 5px; overflow: hidden }
.funnel-bar { height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 500; color: white; white-space: nowrap; min-width: 32px; transition: width 0.5s ease }
.funnel-count { font-size: 12px; font-weight: 600; width: 32px; text-align: right; flex-shrink: 0; color: var(--t0) }

/* ─── Donut ──────────────────────────────────── */
.donut-wrap { display: flex; align-items: center; gap: 20px }
.donut-svg { flex-shrink: 0 }
.donut-legend { display: flex; flex-direction: column; gap: 9px }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t1) }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0 }
.legend-val { font-weight: 600; color: var(--t0); margin-left: auto; padding-left: 12px }

/* ─── Rejection reasons ──────────────────────── */
.reason-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.reason-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px }
.reason-row:last-child { margin: 0 }
.reason-name { font-size: 13px; flex: 1; color: var(--t0) }
.reason-bar-wrap { flex: 2; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden }
.reason-bar { height: 100%; border-radius: 4px; background: var(--red) }
.reason-pct { font-size: 12px; font-weight: 600; color: var(--red); width: 36px; text-align: right }

/* ─── Proc table ─────────────────────────────── */
.proc-table { width: 100%; border-collapse: collapse }
.proc-table th { font-size: 10px; color: var(--t2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; text-align: left; padding: 0 0 10px 0; border-bottom: 1px solid var(--border-m) }
.proc-table td { font-size: 13px; padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--t0) }
.proc-table tr:last-child td { border: none }
.proc-table td:not(:first-child) { text-align: right }
.conv-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.03em }

/* ─── States ─────────────────────────────────── */
.loading { padding: 64px; text-align: center; color: var(--t2); font-size: 13px }

/* ─── Responsive ─────────────────────────────── */
@media (max-width: 900px) {
  :root { --sb-width: 60px }
  .sb-item span, .sb-user-info { display: none }
  .sb-item { padding: 10px; justify-content: center; box-shadow: none }
  .sb-item.active { background: var(--sb-active-bg) }
  .sb-brand { padding: 12px 8px; display: flex; justify-content: center }
  .sb-name, .sb-tagline { display: none }
  .sb-nav { padding: 8px 6px }
  .sb-bottom { padding: 10px 6px }
  .sb-user { justify-content: center }
  .sb-user-av { margin: 0 }
  .page { padding: 20px 16px 48px }
  .period-cmd-inner { padding: 0 16px }
}
@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: repeat(2,1fr) }
  .charts-row { grid-template-columns: 1fr }
  .pcb-status { display: none }
}

</style>
</head>
<body>

<div class="admin-layout">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="sb-watermark" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="currentColor">
        <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="50" cy="8"  r="2.4"/>
        <circle cx="92" cy="50" r="2.4"/>
        <circle cx="50" cy="92" r="2.4"/>
        <circle cx="8"  cy="50" r="2.4"/>
        <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="0.7" stroke-dasharray="3.5,2.5" opacity="0.55"/>
        <polygon points="50,0 51.34,46.77 64.14,35.86 53.23,48.66 80,50 53.23,51.34 64.14,64.14 51.34,53.23 50,100 48.66,53.23 35.86,64.14 46.77,51.34 20,50 46.77,48.66 35.86,35.86 48.66,46.77"/>
        <circle cx="50" cy="50" r="5.5"/>
      </svg>
    </div>
    <div class="sb-brand">
      <svg class="sb-compass" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,2 21.2,17.5 26,14 21.8,19 38,20 21.8,21 26,26 21.2,22.5 20,38 18.8,22.5 14,26 18.2,21 2,20 18.2,19 14,14 18.8,17.5" fill="#C9A96E" opacity="0.9"/>
        <polygon points="20,2 20.6,17.8 22.5,16.2 20.9,18.8 26,20 20.9,21.2 22.5,23.8 20.6,22.2 20,38 19.4,22.2 17.5,23.8 19.1,21.2 14,20 19.1,18.8 17.5,16.2 19.4,17.8" fill="white" opacity="0.95"/>
        <circle cx="20" cy="20" r="2.8" fill="#C9A96E"/>
        <circle cx="20" cy="20" r="1.4" fill="white"/>
      </svg>
      <div>
        <div class="sb-name">ASTRAI</div>
        <div class="sb-tagline">inteligência que guia</div>
      </div>
    </div>
    <nav class="sb-nav">
      <a id="nav-painel" href="#" class="sb-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
        <span>Painel</span>
      </a>
      <a id="nav-hoje" href="#" class="sb-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="12" height="11" rx="1.5"/>
          <line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/>
          <line x1="2" y1="7" x2="14" y2="7"/>

        <span>Hoje</span>
      </a>
      <a id="nav-relatorio" href="#" class="sb-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="3"    y1="13" x2="3"    y2="8"/>
          <line x1="6.5"  y1="13" x2="6.5"  y2="5"/>
          <line x1="10"   y1="13" x2="10"   y2="9"/>
          <line x1="13.5" y1="13" x2="13.5" y2="3"/>
          <line x1="1"    y1="13" x2="15"   y2="13"/>
        </svg>
        <span>Relatórios</span>
      </a>
      <div class="sb-divider"></div>
      <a id="nav-config" href="#" class="sb-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="2.2"/>
          <path d="M8 2.5V4M8 12V13.5M2.5 8H4M12 8h1.5M4.1 4.1l1.1 1.1M10.8 10.8l1.1 1.1M4.1 11.9l1.1-1.1M10.8 5.2l1.1-1.1"/>

    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-user-av">L</div>
        <div class="sb-user-info">
          <div class="sb-user-name" id="clinic-name">Carregando...</div>
          <div class="sb-user-role">Admin</div>
        </div>
        <button onclick="logout()" class="sb-logout" title="Sair">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10.5 5.5l3 2.5-3 2.5M13.5 8H7M7 3H4a1 1 0 00-1 1v8a1 1 0 001 1h3"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <div class="main">

    <!-- Period bar (sticky) -->
    <div class="period-cmd-bar">
      <div class="period-cmd-inner">
        <div class="pcb-status">
          <div class="pcb-dot" id="pcb-dot"></div>
          <div class="pcb-info">
            <span class="pcb-label">Exibindo dados de</span>
            <span class="pcb-range" id="period-display">Todos os períodos</span>
          </div>
        </div>
        <div class="pcb-pills">
          <button class="pcb-pill" onclick="quickPeriod('hoje',this)">Hoje</button>
          <button class="pcb-pill" onclick="quickPeriod('semana',this)">Esta semana</button>
          <button class="pcb-pill" onclick="quickPeriod('15dias',this)">Últimos 15d</button>
          <button class="pcb-pill" id="pcb-30" onclick="quickPeriod('30dias',this)">Últimos 30d</button>
          <button class="pcb-pill" onclick="quickPeriod('ano',this)">Ano todo</button>
        </div>
        <div class="pcb-sep"></div>
        <div class="pcb-custom-wrap" id="date-filter-wrap">
          <button class="pcb-custom" id="date-filter-btn" onclick="toggleDatePicker()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="12" height="11" rx="1.5"/>
              <line x1="5" y1="1.5" x2="5" y2="4.5"/>
              <line x1="11" y1="1.5" x2="11" y2="4.5"/>
              <line x1="2" y1="7" x2="14" y2="7"/>
            </svg>
            Personalizar
          </button>
          <div class="date-picker-panel" id="date-picker-panel">
            <div class="dp-row">
              <span class="dp-label">De</span>
              <input type="date" class="dp-input" id="dp-from">
            </div>
            <div class="dp-row">
              <span class="dp-label">Até</span>
              <input type="date" class="dp-input" id="dp-to">
            </div>
            <div class="dp-actions">
              <button class="dp-clear" onclick="clearDateFilter()">Limpar</button>
              <button class="dp-apply" onclick="applyDateFilter()">Aplicar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Page -->
    <div class="page">
      <div class="page-title">Relatórios</div>
      <div class="page-sub">Visão geral de leads, agendamentos e conversão por procedimento</div>
      <div id="report"><div class="loading">Carregando dados...</div></div>
    </div>

  </div><!-- /main -->
</div><!-- /admin-layout -->

<script>
if (!localStorage.getItem("token")) {
  location.href = "/login"
}

const API = window.location.origin
const SLUG = location.pathname.split('/').filter(Boolean)[0] || localStorage.getItem('laco_slug') || ''

;(function setNavLinks() {
  const base = SLUG ? '/' + SLUG : ''
  document.getElementById('nav-painel').href    = base + '/'
  document.getElementById('nav-hoje').href      = base + '/hoje'
  document.getElementById('nav-relatorio').href = base + '/relatorio'
  document.getElementById('nav-config').href    = base + '/config'
})()

;(async function loadClinicName() {
  try {
    const r = await fetch(`${API}/api/portal/${SLUG}`)
    if (r.ok) {
      const d = await r.json()
      const el = document.getElementById('clinic-name')
      if (el) el.textContent = d.clinic.name
    }
  } catch(e) {}
})()

function logout() {
  localStorage.removeItem('token')
  localStorage.removeItem('refreshToken')
  localStorage.removeItem('user')
  localStorage.removeItem('laco_slug')
  localStorage.removeItem('laco_onboarding_step')
  location.href = '/login'
}

let dateFrom = null, dateTo = null
function h() { const jwt = localStorage.getItem('token'); return jwt ? { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt } : {} }

const fmtISO = d => d.toISOString().slice(0,10)
const fmtPT  = s => new Date(s + 'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})
function buildDP() {
  const p = []
  if (dateFrom) p.push(`date_from=${dateFrom}`)
  if (dateTo)   p.push(`date_to=${dateTo}`)
  return p.length ? '?' + p.join('&') : ''
}

function quickPeriod(type, el) {
  const today = new Date()
  let from, to, label
  if (type === 'hoje') {
    from = to = fmtISO(today); label = 'Hoje'
  } else if (type === 'semana') {
    const mon = new Date(today); mon.setDate(today.getDate() - ((today.getDay() + 6) % 7))
    from = fmtISO(mon); to = fmtISO(today); label = 'Esta semana'
  } else if (type === '15dias') {
    const d = new Date(today); d.setDate(today.getDate() - 14)
    from = fmtISO(d); to = fmtISO(today); label = 'Últimos 15 dias'
  } else if (type === '30dias') {
    const d = new Date(today); d.setDate(today.getDate() - 29)
    from = fmtISO(d); to = fmtISO(today); label = 'Últimos 30 dias'
  } else if (type === 'ano') {
    from = today.getFullYear() + '-01-01'; to = fmtISO(today); label = 'Ano todo'
  }
  dateFrom = from; dateTo = to
  document.querySelectorAll('.pcb-pill').forEach(p => p.classList.remove('on'))
  document.getElementById('date-filter-btn').classList.remove('on')
  if (el) el.classList.add('on')
  updatePeriodDisplay(label, from, to)
  load()
}

function updatePeriodDisplay(label, from, to) {
  const dot = document.getElementById('pcb-dot')
  const display = document.getElementById('period-display')
  if (!from && !to) {
    dot && dot.classList.remove('live')
    display && (display.textContent = 'Todos os períodos')
  } else {
    dot && dot.classList.add('live')
    const range = from === to ? fmtPT(from) : `${fmtPT(from)} → ${fmtPT(to)}`
    display && (display.textContent = label ? `${label}  ·  ${range}` : range)
  }
}

function toggleDatePicker() {
  document.getElementById('date-picker-panel').classList.toggle('on')
}
function applyDateFilter() {
  dateFrom = document.getElementById('dp-from').value || null
  dateTo   = document.getElementById('dp-to').value   || null
  document.getElementById('date-picker-panel').classList.remove('on')
  document.querySelectorAll('.pcb-pill').forEach(p => p.classList.remove('on'))
  document.getElementById('date-filter-btn').classList.toggle('on', !!(dateFrom || dateTo))
  updatePeriodDisplay('Personalizado', dateFrom, dateTo)
  load()
}
function clearDateFilter() {
  dateFrom = null; dateTo = null
  document.getElementById('dp-from').value = ''
  document.getElementById('dp-to').value   = ''
  document.getElementById('date-filter-btn').classList.remove('on')
  document.querySelectorAll('.pcb-pill').forEach(p => p.classList.remove('on'))
  document.getElementById('date-picker-panel').classList.remove('on')
  updatePeriodDisplay(null, null, null)
  load()
}
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('date-filter-wrap')
  if (wrap && !wrap.contains(e.target)) document.getElementById('date-picker-panel').classList.remove('on')
})

async function load() {
  document.getElementById('report').innerHTML = '<div class="loading">Carregando dados...</div>'
  const dp = buildDP()
  try {
    const [ls, as_, leads, apts] = await Promise.all([
      fetch(`${API}/api/leads/stats${dp}`, { headers: h() }).then(r => r.json()),
      fetch(`${API}/api/appointments/stats${dp}`, { headers: h() }).then(r => r.json()),
      fetch(`${API}/api/leads${dp || '?'}${dp ? '&' : ''}status=todos`, { headers: h() }).then(r => r.json()),
      fetch(`${API}/api/appointments${dp}`, { headers: h() }).then(r => r.json()),
    ])
    render(ls, as_, Array.isArray(leads) ? leads : [], Array.isArray(apts) ? apts : [])
  } catch(e) {
    document.getElementById('report').innerHTML = '<div class="loading">Erro ao carregar relatório.</div>'
  }
}

function render(ls, as_, leads, apts) {
  const total = parseInt(ls.total) || 0
  const scheduled = parseInt(ls.scheduled) || 0
  const rejected = parseInt(ls.rejected) || 0
  const linkSent = parseInt(ls.link_sent) || 0
  const newLeads = parseInt(ls.new_leads) || 0
  const convRate = total > 0 ? Math.round(scheduled / total * 100) : 0
  const rejRate  = total > 0 ? Math.round(rejected / total * 100) : 0

  const reasons = {}
  leads.filter(l => l.reject_reason).forEach(l => {
    const r = l.reject_reason
    reasons[r] = (reasons[r] || 0) + 1
  })
  const reasonLabels = { orcamento: 'Fora do orçamento', outro: 'Quer ver outro procedimento' }
  const totalRejected = Object.values(reasons).reduce((a,b)=>a+b,0)

  const procMap = {}
  leads.forEach(l => {
    if (!l.procedure_name) return
    if (!procMap[l.procedure_name]) procMap[l.procedure_name] = { views:0, scheduled:0, rejected:0 }
    procMap[l.procedure_name].views++
    if (l.status === 'scheduled') procMap[l.procedure_name].scheduled++
    if (l.status === 'rejected')  procMap[l.procedure_name].rejected++
  })
  const procs = Object.entries(procMap).sort((a,b) => b[1].views - a[1].views)

  const donutData = [
    { label:'Agendados',    val: scheduled, color:'#B59248' },
    { label:'Não agendaram',val: rejected,  color:'#D4899A' },
    { label:'Link enviado', val: linkSent,  color:'#EF9F27' },
    { label:'Novos',        val: newLeads,  color:'#CCCEC7' },
  ].filter(d => d.val > 0)

  document.getElementById('report').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total de leads</div><div class="kpi-val">${total}</div><div class="kpi-sub">Todos os contatos</div></div>
      <div class="kpi"><div class="kpi-label">Agendamentos</div><div class="kpi-val green">${scheduled}</div><div class="kpi-sub">${convRate}% de conversão</div></div>
      <div class="kpi"><div class="kpi-label">Não agendaram</div><div class="kpi-val red">${rejected}</div><div class="kpi-sub">${rejRate}% de recusa</div></div>
      <div class="kpi"><div class="kpi-label">Confirmados</div><div class="kpi-val purple">${parseInt(as_.confirmed)||0}</div><div class="kpi-sub">de ${parseInt(as_.total)||0} agendamentos</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Funil de conversão</div>
        <div class="funnel">
          ${renderFunnelRow('Leads captados', total, total, '#B59248')}
          ${renderFunnelRow('Link enviado', linkSent + scheduled + rejected, total, '#B5944A')}
          ${renderFunnelRow('Visualizaram', rejected + scheduled, total, '#EF9F27')}
          ${renderFunnelRow('Agendaram', scheduled, total, '#2A7A5A')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Status dos leads</div>
        <div class="donut-wrap">
          ${renderDonut(donutData, total)}
          <div class="donut-legend">
            ${donutData.map(d => `
              <div class="legend-item">
                <div class="legend-dot" style="background:${d.color}"></div>
                <span>${d.label}</span>
                <span class="legend-val">${d.val}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    ${Object.keys(reasons).length ? `
    <div class="reason-card">
      <div class="chart-title" style="margin-bottom:14px">Motivos de recusa</div>
      ${Object.entries(reasons).map(([k,v]) => `
        <div class="reason-row">
          <span class="reason-name">${reasonLabels[k]||k}</span>
          <div class="reason-bar-wrap"><div class="reason-bar" style="width:${totalRejected>0?Math.round(v/totalRejected*100):0}%"></div></div>
          <span class="reason-pct">${totalRejected>0?Math.round(v/totalRejected*100):0}%</span>
        </div>`).join('')}
    </div>` : ''}

    ${procs.length ? `
    <div class="chart-card">
      <div class="chart-title">Conversão por procedimento</div>
      <table class="proc-table">
        <thead><tr>
          <th>Procedimento</th>
          <th>Visualizações</th>
          <th>Agendaram</th>
          <th>Recusaram</th>
          <th>Conversão</th>
        </tr></thead>
        <tbody>
          ${procs.map(([name, d]) => {
            const conv = d.views > 0 ? Math.round(d.scheduled / d.views * 100) : 0
            const color  = conv >= 50 ? 'rgba(42,122,90,0.08)'  : conv >= 25 ? 'rgba(138,96,8,0.09)'  : 'rgba(160,40,40,0.08)'
            const tcolor = conv >= 50 ? '#2A7A5A' : conv >= 25 ? '#8A6008' : '#A02828'
            return `<tr>
              <td>${esc(name)}</td>
              <td>${d.views}</td>
              <td>${d.scheduled}</td>
              <td>${d.rejected}</td>
              <td><span class="conv-pill" style="background:${color};color:${tcolor}">${conv}%</span></td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `
}

function renderFunnelRow(label, val, total, color) {
  const pct = total > 0 ? Math.max(8, Math.round(val / total * 100)) : 8
  return `
    <div class="funnel-row">
      <span class="funnel-label">${label}</span>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${pct}%;background:${color}">${val > 0 ? val : ''}</div>
      </div>
      <span class="funnel-count">${val}</span>
    </div>`
}

function renderDonut(data, total) {
  if (!total) return '<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="none" stroke="#E8E5DF" stroke-width="16"/></svg>'
  const r = 35, cx = 50, cy = 50, circ = 2 * Math.PI * r
  let offset = -circ * 0.25
  const slices = data.map(d => {
    const frac = d.val / total
    const dash = frac * circ
    const slice = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="16"
      stroke-dasharray="${dash} ${circ - dash}"
      stroke-dashoffset="${-offset + circ * 0.25}"
      transform="rotate(-90,${cx},${cy})"/>`
    offset += dash
    return slice
  })
  return `
    <svg class="donut-svg" width="110" height="110" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="35" fill="none" stroke="#EEEBE4" stroke-width="16"/>
      ${slices.join('')}
      <text x="50" y="47" text-anchor="middle" font-size="16" font-weight="600" fill="#1A1C18">${total}</text>
      <text x="50" y="59" text-anchor="middle" font-size="9" fill="#969890">leads</text>
    </svg>`
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

quickPeriod('30dias', document.getElementById('pcb-30'))
</script>
</body>
</html>
