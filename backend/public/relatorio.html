<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laço — Relatório</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#FAF7F5;color:#1A1614;min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{background:white;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:8px}
.brand-dot{width:26px;height:26px;border-radius:7px;background:#B8657A;display:flex;align-items:center;justify-content:center}
.brand-dot svg{width:13px;height:13px;fill:white}
.brand-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:17px;font-weight:600;color:#1A1614;letter-spacing:0.02em}
.back-btn{font-size:12px;color:#B8657A;cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none;padding:0}
.back-btn:hover{text-decoration:underline}
.page{max-width:900px;margin:0 auto;padding:24px}
.page-title{font-size:18px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:#666;margin-bottom:24px}

/* Stats grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.kpi{background:white;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);padding:16px 18px}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px}
.kpi-val{font-size:26px;font-weight:500;line-height:1}
.kpi-sub{font-size:11px;color:#aaa;margin-top:4px}
.kpi-val.green{color:#2E8C66}
.kpi-val.purple{color:#B8657A}
.kpi-val.amber{color:#9A6B10}
.kpi-val.red{color:#A32D2D}

/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:white;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);padding:18px 20px}
.chart-title{font-size:13px;font-weight:500;margin-bottom:16px}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:8px}
.funnel-row{display:flex;align-items:center;gap:10px}
.funnel-label{font-size:12px;color:#666;width:110px;flex-shrink:0;text-align:right}
.funnel-bar-wrap{flex:1;height:28px;background:#F0EBE8;border-radius:6px;overflow:hidden;position:relative}
.funnel-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:500;color:white;white-space:nowrap;min-width:32px;transition:width 0.6s ease}
.funnel-count{font-size:12px;font-weight:500;width:32px;text-align:right;flex-shrink:0}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#555}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-val{font-weight:500;color:#111;margin-left:auto;padding-left:12px}

/* Rejection reasons */
.reason-card{background:white;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);padding:18px 20px;margin-bottom:14px}
.reason-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.reason-row:last-child{margin:0}
.reason-name{font-size:13px;flex:1}
.reason-bar-wrap{flex:2;height:8px;background:#F0EBE8;border-radius:4px;overflow:hidden}
.reason-bar{height:100%;border-radius:4px;background:#F0997B}
.reason-pct{font-size:12px;font-weight:500;color:#A04830;width:36px;text-align:right}

/* Proc table */
.proc-table{width:100%;border-collapse:collapse}
.proc-table th{font-size:11px;color:#aaa;font-weight:500;text-align:left;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.proc-table td{font-size:13px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.proc-table tr:last-child td{border:none}
.proc-table td:not(:first-child){text-align:right}
.conv-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}

.loading{padding:64px;text-align:center;color:#aaa;font-size:13px}

@media(max-width:600px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .charts-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"><svg viewBox="0 0 16 16"><circle cx="8" cy="6" r="3.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" fill-rule="evenodd"/></svg></div>
    <span class="brand-name">Laço</span>
  </div>
  <button class="back-btn" onclick="window.location.href='/'">← Voltar</button>
</div>

<div class="page">
  <div class="page-title">Relatório de conversão</div>
  <div class="page-sub">Visão geral de leads, agendamentos e motivos de recusa</div>
  <div id="report"><div class="loading">Carregando dados...</div></div>
</div>

<script>
if (!sessionStorage.getItem('laco_auth') && !localStorage.getItem('laco_api_key')) {
  window.location.href = '/login.html'
}

const API = window.location.origin
const API_KEY = localStorage.getItem('laco_api_key') || ''
const SLUG = localStorage.getItem('laco_slug') || 'bella-estetica'
function h() { return { 'Content-Type': 'application/json', 'x-api-key': API_KEY } }

async function load() {
  try {
    const [ls, as_, leads, apts] = await Promise.all([
      fetch(`${API}/api/leads/stats`, { headers: h() }).then(r => r.json()),
      fetch(`${API}/api/appointments/stats`, { headers: h() }).then(r => r.json()),
      fetch(`${API}/api/leads?status=todos`, { headers: h() }).then(r => r.json()),
      fetch(`${API}/api/appointments`, { headers: h() }).then(r => r.json()),
    ])
    render(ls, as_, Array.isArray(leads) ? leads : [], Array.isArray(apts) ? apts : [])
  } catch(e) {
    document.getElementById('report').innerHTML = '<div class="loading">Erro ao carregar relatório.</div>'
  }
}

function render(ls, as_, leads, apts) {
  const total = parseInt(ls.total) || 0
  const scheduled = parseInt(ls.scheduled) || 0
  const rejected = parseInt(ls.rejected) || 0
  const linkSent = parseInt(ls.link_sent) || 0
  const newLeads = parseInt(ls.new_leads) || 0
  const convRate = total > 0 ? Math.round(scheduled / total * 100) : 0
  const rejRate  = total > 0 ? Math.round(rejected / total * 100) : 0

  // Rejection reasons
  const reasons = {}
  leads.filter(l => l.reject_reason).forEach(l => {
    const r = l.reject_reason
    reasons[r] = (reasons[r] || 0) + 1
  })
  const reasonLabels = { orcamento: 'Fora do orçamento', outro: 'Quer ver outro procedimento' }
  const totalRejected = Object.values(reasons).reduce((a,b)=>a+b,0)

  // Procedures conversion
  const procMap = {}
  leads.forEach(l => {
    if (!l.procedure_name) return
    if (!procMap[l.procedure_name]) procMap[l.procedure_name] = { views:0, scheduled:0, rejected:0 }
    procMap[l.procedure_name].views++
    if (l.status === 'scheduled') procMap[l.procedure_name].scheduled++
    if (l.status === 'rejected')  procMap[l.procedure_name].rejected++
  })
  const procs = Object.entries(procMap).sort((a,b) => b[1].views - a[1].views)

  // Donut data
  const donutData = [
    { label:'Agendados',    val: scheduled, color:'#B8657A' },
    { label:'Não agendaram',val: rejected,  color:'#F0997B' },
    { label:'Link enviado', val: linkSent,  color:'#EF9F27' },
    { label:'Novos',        val: newLeads,  color:'#ddd' },
  ].filter(d => d.val > 0)

  document.getElementById('report').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total de leads</div><div class="kpi-val">${total}</div><div class="kpi-sub">Todos os contatos</div></div>
      <div class="kpi"><div class="kpi-label">Agendamentos</div><div class="kpi-val green">${scheduled}</div><div class="kpi-sub">${convRate}% de conversão</div></div>
      <div class="kpi"><div class="kpi-label">Não agendaram</div><div class="kpi-val red">${rejected}</div><div class="kpi-sub">${rejRate}% de recusa</div></div>
      <div class="kpi"><div class="kpi-label">Confirmados</div><div class="kpi-val purple">${parseInt(as_.confirmed)||0}</div><div class="kpi-sub">de ${parseInt(as_.total)||0} agendamentos</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Funil de conversão</div>
        <div class="funnel">
          ${renderFunnelRow('Leads captados', total, total, '#B8657A')}
          ${renderFunnelRow('Link enviado', linkSent + scheduled + rejected, total, '#D4899A')}
          ${renderFunnelRow('Visualizaram', rejected + scheduled, total, '#EF9F27')}
          ${renderFunnelRow('Agendaram', scheduled, total, '#2E8C66')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Status dos leads</div>
        <div class="donut-wrap">
          ${renderDonut(donutData, total)}
          <div class="donut-legend">
            ${donutData.map(d => `
              <div class="legend-item">
                <div class="legend-dot" style="background:${d.color}"></div>
                <span>${d.label}</span>
                <span class="legend-val">${d.val}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    ${Object.keys(reasons).length ? `
    <div class="reason-card">
      <div class="chart-title" style="margin-bottom:14px">Motivos de recusa</div>
      ${Object.entries(reasons).map(([k,v]) => `
        <div class="reason-row">
          <span class="reason-name">${reasonLabels[k]||k}</span>
          <div class="reason-bar-wrap"><div class="reason-bar" style="width:${totalRejected>0?Math.round(v/totalRejected*100):0}%"></div></div>
          <span class="reason-pct">${totalRejected>0?Math.round(v/totalRejected*100):0}%</span>
        </div>`).join('')}
    </div>` : ''}

    ${procs.length ? `
    <div class="chart-card" style="background:white;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);padding:18px 20px">
      <div class="chart-title">Conversão por procedimento</div>
      <table class="proc-table">
        <thead><tr>
          <th>Procedimento</th>
          <th>Visualizações</th>
          <th>Agendaram</th>
          <th>Recusaram</th>
          <th>Conversão</th>
        </tr></thead>
        <tbody>
          ${procs.map(([name, d]) => {
            const conv = d.views > 0 ? Math.round(d.scheduled / d.views * 100) : 0
            const color = conv >= 50 ? '#E0F4EE' : conv >= 25 ? '#FEF3E2' : '#FAECE7'
            const tcolor = conv >= 50 ? '#27500A' : conv >= 25 ? '#633806' : '#712B13'
            return `<tr>
              <td>${esc(name)}</td>
              <td>${d.views}</td>
              <td>${d.scheduled}</td>
              <td>${d.rejected}</td>
              <td><span class="conv-pill" style="background:${color};color:${tcolor}">${conv}%</span></td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `
}

function renderFunnelRow(label, val, total, color) {
  const pct = total > 0 ? Math.max(8, Math.round(val / total * 100)) : 8
  return `
    <div class="funnel-row">
      <span class="funnel-label">${label}</span>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${pct}%;background:${color}">${val > 0 ? val : ''}</div>
      </div>
      <span class="funnel-count">${val}</span>
    </div>`
}

function renderDonut(data, total) {
  if (!total) return '<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="none" stroke="#eee" stroke-width="16"/></svg>'
  const r = 35, cx = 50, cy = 50, circ = 2 * Math.PI * r
  let offset = -circ * 0.25 // start from top
  const slices = data.map(d => {
    const frac = d.val / total
    const dash = frac * circ
    const slice = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="16"
      stroke-dasharray="${dash} ${circ - dash}"
      stroke-dashoffset="${-offset + circ * 0.25}"
      transform="rotate(-90,${cx},${cy})"/>`
    offset += dash
    return slice
  })
  return `
    <svg class="donut-svg" width="110" height="110" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="35" fill="none" stroke="#f0f0f0" stroke-width="16"/>
      ${slices.join('')}
      <text x="50" y="47" text-anchor="middle" font-size="16" font-weight="500" fill="#111">${total}</text>
      <text x="50" y="59" text-anchor="middle" font-size="9" fill="#aaa">leads</text>
    </svg>`
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

load()
</script>
</body>
</html>
