<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laço — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#B8657A;
  --brand-h:#a85a6e;
  --brand-a:#96506a;
  --brand-dim:rgba(184,101,122,0.10);
  --brand-ring:rgba(184,101,122,0.18);
  --gold:#B8945A;
  --surface:#FAF7F5;
  --card:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --border-strong:rgba(0,0,0,0.14);
  --t0:#1A1614;
  --t1:#6B5E59;
  --t2:#A89890;
  --error-bg:#FDF0F2;
  --error-border:#E8A0AC;
  --error-text:#8B2D3D;
}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--surface);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  -webkit-font-smoothing:antialiased;
}

/* Fundo decorativo sutil */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(184,101,122,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(184,148,90,0.04) 0%, transparent 70%);
  pointer-events:none;
}

.card{
  background:var(--card);
  border-radius:20px;
  border:0.5px solid var(--border);
  padding:40px 36px;
  width:100%;
  max-width:380px;
  position:relative;
  box-shadow:0 4px 32px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
}

/* Logo */
.logo-wrap{display:flex;align-items:center;gap:11px;margin-bottom:32px}
.logo-mark{
  width:36px;height:36px;border-radius:11px;
  background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(184,101,122,0.30);
  flex-shrink:0;
}
.logo-mark svg{width:17px;height:17px;fill:white}
.logo-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:22px;font-weight:600;
  color:var(--t0);
  letter-spacing:0.02em;
  line-height:1;
}
.logo-name span{color:var(--brand)}

/* Headings */
h1{font-size:18px;font-weight:500;color:var(--t0);margin-bottom:5px;line-height:1.3}
.sub{font-size:13px;color:var(--t1);margin-bottom:28px;line-height:1.6}

/* Field */
.field{margin-bottom:18px}
.field label{
  font-size:11px;font-weight:500;
  color:var(--t1);
  display:block;margin-bottom:6px;
  text-transform:uppercase;letter-spacing:0.06em;
}
.field input{
  width:100%;padding:12px 15px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  border:0.5px solid var(--border-strong);
  border-radius:10px;
  color:var(--t0);
  background:var(--surface);
  outline:none;
  -webkit-appearance:none;
  transition:border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
.field input:focus{
  background:white;
  border-color:var(--brand);
  box-shadow:0 0 0 3px var(--brand-ring);
}
.field input::placeholder{color:var(--t2)}

/* Botão */
.btn{
  width:100%;padding:13px;
  background:var(--brand);
  border:none;border-radius:10px;
  color:white;
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background 0.15s, box-shadow 0.15s, transform 0.1s;
  letter-spacing:0.01em;
}
.btn:hover{background:var(--brand-h);box-shadow:0 4px 16px rgba(184,101,122,0.28)}
.btn:active{background:var(--brand-a);transform:translateY(1px)}
.btn:disabled{background:var(--t2);cursor:default;box-shadow:none;transform:none}

/* Erro */
.error{
  background:var(--error-bg);
  border:0.5px solid var(--error-border);
  color:var(--error-text);
  border-radius:10px;
  padding:11px 14px;
  font-size:13px;
  margin-bottom:18px;
  display:none;
  line-height:1.5;
}

/* Spinner */
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Rodapé discreto */
.card-footer{
  margin-top:24px;
  padding-top:20px;
  border-top:0.5px solid var(--border);
  text-align:center;
  font-size:11px;
  color:var(--t2);
  letter-spacing:0.02em;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">
      <svg viewBox="0 0 17 17"><circle cx="8.5" cy="6" r="3.5"/><path d="M2 16c0-3.6 2.9-6.5 6.5-6.5S15 12.4 15 16" fill-rule="evenodd"/></svg>
    </div>
    <span class="logo-name">La<span>ç</span>o</span>
  </div>
  <h1>Bem-vinda de volta</h1>
  <p class="sub">Acesso exclusivo para a clínica.</p>
  <div class="error" id="error">Chave de acesso incorreta. Tente novamente.</div>
  <div class="field">
    <label>Chave de acesso</label>
    <input type="password" id="key-input" placeholder="••••••••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="login-btn" onclick="login()">Entrar na plataforma</button>
  <div class="card-footer">Laço CRM · Clínicas Estéticas</div>
</div>
<script>
if (sessionStorage.getItem('laco_auth') === '1') {
  window.location.href = '/'
}

async function login() {
  const key = document.getElementById('key-input').value.trim()
  if (!key) return
  const btn = document.getElementById('login-btn')
  const err = document.getElementById('error')
  btn.disabled = true
  btn.innerHTML = '<div class="spinner"></div>'
  err.style.display = 'none'
  try {
    const r = await fetch('/api/leads/stats', {
      headers: { 'x-api-key': key }
    })
    if (r.ok) {
      sessionStorage.setItem('laco_auth', '1')
      localStorage.setItem('laco_api_key', key)
      window.location.href = '/'
    } else {
      err.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Entrar na plataforma'
    }
  } catch {
    err.textContent = 'Erro de conexão. Verifique o servidor.'
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Entrar na plataforma'
  }
}
</script>
</body>
</html>
