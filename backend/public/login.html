<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laco - Entrar</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;margin:0;background:#f6f5f2;color:#202124;display:grid;min-height:100vh;place-items:center}
    main{width:min(420px,calc(100vw - 32px));background:white;border:1px solid #ddd8cf;border-radius:8px;padding:28px;box-shadow:0 18px 50px #0001}
    label{display:block;font-size:14px;margin:16px 0 6px} input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #cfc8bb;border-radius:6px;font:inherit}
    button{width:100%;margin-top:18px;padding:12px;border:0;border-radius:6px;background:#1e6f5c;color:white;font-weight:700;cursor:pointer}
    a{color:#1e6f5c}.error{color:#9b1c1c;min-height:20px}
  </style>
</head>
<body>
  <main>
    <h1>Entrar</h1>
    <form id="form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <p class="error" id="error"></p>
      <button type="submit">Entrar</button>
    </form>
    <p><a href="/cadastro">Criar conta</a></p>
  </main>
  <script>
    form.addEventListener('submit', async (event) => {
      event.preventDefault()
      error.textContent = ''
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.value, password: password.value })
      })
      const data = await res.json()
      if (!res.ok) { error.textContent = data.error || 'Falha no login'; return }
      localStorage.setItem('token', data.token)
      localStorage.setItem('refreshToken', data.refreshToken)
      localStorage.setItem('user', JSON.stringify(data.user))
      location.href = data.user.role === 'superadmin' ? '/superadmin' : '/onboarding'
    })
  </script>
</body>
</html>
