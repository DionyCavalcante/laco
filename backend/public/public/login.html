<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laço — Entrar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:white;border-radius:16px;border:0.5px solid rgba(0,0,0,0.09);padding:36px 32px;width:100%;max-width:380px}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-dot{width:32px;height:32px;border-radius:9px;background:#9B6FA5;display:flex;align-items:center;justify-content:center}
.logo-dot svg{width:16px;height:16px;fill:white}
.logo-name{font-size:18px;font-weight:500;color:#111}
h1{font-size:20px;font-weight:500;margin-bottom:6px}
.sub{font-size:13px;color:#666;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:16px}
.field label{font-size:12px;color:#666;display:block;margin-bottom:5px;font-weight:500}
.field input{width:100%;padding:11px 14px;font-size:14px;border:0.5px solid rgba(0,0,0,0.18);border-radius:9px;color:#111;background:white;outline:none;-webkit-appearance:none}
.field input:focus{border-color:#9B6FA5;box-shadow:0 0 0 3px rgba(155,111,165,0.12)}
.btn{width:100%;padding:12px;background:#9B6FA5;border:none;border-radius:9px;color:white;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:#8a5f94}
.btn:active{background:#7A4F7A}
.btn:disabled{background:#ccc;cursor:default}
.error{background:#FCEBEB;border:0.5px solid #F09595;color:#A32D2D;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-dot"><svg viewBox="0 0 16 16"><circle cx="8" cy="6" r="3.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" fill-rule="evenodd"/></svg></div>
    <span class="logo-name">Laço</span>
  </div>
  <h1>Entrar na plataforma</h1>
  <p class="sub">Acesso exclusivo para a clínica.</p>
  <div class="error" id="error">Chave de acesso incorreta. Tente novamente.</div>
  <div class="field">
    <label>Chave de acesso</label>
    <input type="password" id="key-input" placeholder="••••••••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="login-btn" onclick="login()">Entrar</button>
</div>
<script>
// Se já tem chave válida em sessão, redireciona
if (sessionStorage.getItem('laco_auth') === '1') {
  window.location.href = '/'
}

async function login() {
  const key = document.getElementById('key-input').value.trim()
  if (!key) return
  const btn = document.getElementById('login-btn')
  const err = document.getElementById('error')
  btn.disabled = true
  btn.innerHTML = '<div class="spinner"></div>'
  err.style.display = 'none'
  try {
    const r = await fetch('/api/leads/stats', {
      headers: { 'x-api-key': key }
    })
    if (r.ok) {
      sessionStorage.setItem('laco_auth', '1')
      localStorage.setItem('laco_api_key', key)
      window.location.href = '/'
    } else {
      err.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Entrar'
    }
  } catch {
    err.textContent = 'Erro de conexão. Verifique o servidor.'
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Entrar'
  }
}
</script>
</body>
</html>
